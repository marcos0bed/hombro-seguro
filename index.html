<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#12151A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Fitmet</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --bg:#12151A; --surface:#1A2028; --surface2:#222A35; --line:#2B3442;
  --text:#EDF0F4; --mut:#8E99A8; --acc:#F0A63C; --acc-dim:#7a5a25;
  --ok:#46C08A; --warn:#E8963E; --bad:#E5484D;
  --r:14px;
  --disp:'Avenir Next Condensed','Arial Narrow','Roboto Condensed',system-ui,sans-serif;
  --mono:ui-monospace,'SF Mono',Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font:16px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased;padding-bottom:calc(70px + env(safe-area-inset-bottom,0px))}
.app{max-width:560px;margin:0 auto;padding:0 14px}
/* Ninguna pestaña puede ser más corta que la pantalla: evita el bug de WebKit
   que desplaza los elementos fixed tras el rebote en páginas sin scroll. */
main#view{min-height:100vh}
a{color:var(--acc)}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
button:focus-visible,a:focus-visible,input:focus-visible{outline:2px solid var(--acc);outline-offset:2px;border-radius:4px}

header{padding:calc(18px + env(safe-area-inset-top,0px)) 2px 10px}
.topline{display:flex;justify-content:space-between;align-items:center}
.topright{display:flex;align-items:center;gap:8px}
.acct{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--line);font-family:var(--disp);font-weight:700;font-size:13px;color:var(--mut);display:grid;place-items:center;padding:0}
.acct.on{border-color:var(--acc);color:var(--acc)}
.fin{width:100%;background:var(--surface2);border:1px solid var(--line);border-radius:10px;color:var(--text);padding:11px 12px;font-size:16px;margin-top:8px}
.abtn{margin-top:12px;width:100%;padding:12px;border-radius:10px;background:var(--acc);color:#12151A;font-family:var(--disp);text-transform:uppercase;letter-spacing:.08em;font-weight:700;font-size:15px}
.abtn.ghost{background:var(--surface2);color:var(--text);border:1px solid var(--line)}
.err{color:var(--bad);font-size:14px;margin-top:10px;display:none}
.err.show{display:block}
.okmsg{color:var(--ok);font-size:14px;margin-top:10px;display:none}
.okmsg.show{display:block}
.donebox{padding:8px 12px}
.doneline{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:13px}
.doneline .di{font-size:14px}
.doneline b{font-weight:600}
.doneline small{color:var(--mut);margin-left:auto;white-space:nowrap;font-family:var(--mono);font-size:11px}
.ach{display:flex;flex-wrap:nowrap;gap:6px;margin-top:10px}
.dmv{display:flex;flex-direction:column;gap:1px;margin:0 8px;font-size:11px;color:var(--mut)}
.dmv span{padding:2px 6px}
button.wkhead{display:flex;justify-content:space-between;align-items:center;width:100%;font-family:var(--disp);font-weight:600;font-size:15px;letter-spacing:.01em;color:inherit;cursor:pointer;text-align:left}
.wkhead .chev{color:var(--mut);font-size:13px;margin-left:10px}
.nsw{display:inline-flex;gap:4px;margin-left:2px}
.nsb{width:26px;height:26px;border-radius:8px;border:1px solid var(--line);background:var(--surface2);color:var(--mut);font-size:15px;line-height:1}
.nsb:disabled{opacity:.3}
.jtab{width:100%;margin-top:12px;font-size:13px;border-collapse:collapse}
.jtab td{padding:7px 0;border-top:1px solid var(--line);vertical-align:top;line-height:1.45}
.jtab .jd{color:var(--mut);font-family:var(--mono);font-size:11px;white-space:nowrap;padding-right:12px;width:1%}
.bp{font-size:13.5px;line-height:1.5;margin:7px 0}
.blist{margin:6px 0 6px 4px;padding-left:16px;font-size:13.5px;line-height:1.55}
.blist li{margin:3px 0}
.achb{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:6px 4px;border-radius:9px;border:1px solid var(--line);background:var(--surface2);opacity:.4;white-space:nowrap;min-width:0}
.achb.on{opacity:1;border-color:var(--acc-dim);background:rgba(240,166,60,.12)}
.achb .ai{font-size:14px}
.achb .al{font-family:var(--disp);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--mut)}
.achb.on .al{color:var(--acc)}
.hab{display:grid;grid-template-columns:repeat(5,1fr);justify-items:center;row-gap:12px;column-gap:8px;margin-top:10px}
.dnav{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 8px}
.dnav b{font-family:var(--disp);font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--mut)}
.dnav button{background:var(--surface2);border:1px solid var(--line);color:inherit;border-radius:9px;width:40px;height:32px;font-size:16px;line-height:1}
.dnav button:disabled{opacity:.25}
.habb{width:42px;height:42px;border-radius:50%;font-size:19px;border:1.5px solid var(--line);background:var(--surface2);opacity:.45;position:relative;padding:0}
.habb.on{opacity:1;border-color:var(--acc);background:rgba(240,166,60,.14)}
.habb.on::after{content:"✓";position:absolute;right:-3px;top:-3px;background:var(--acc);color:#12151A;font-size:10px;font-weight:700;width:16px;height:16px;border-radius:50%;line-height:16px}
.dgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px 8px}
.dgrid .dval{font-family:var(--disp);font-weight:700;font-size:19px;margin-top:2px}
.dgrid .tlab{font-size:10.5px}
.dgrid .dsub{font-family:var(--disp);font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
.syncnote{font-size:13px;color:var(--mut);margin:6px 2px}
.syncnote a{cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.bar{display:flex;align-items:center;gap:8px;margin:7px 0}
.bar .bl{width:88px;font-size:12px;color:var(--mut);text-transform:uppercase;font-family:var(--disp);font-weight:600;letter-spacing:.04em}
.bar .bt{flex:1;height:14px;background:var(--surface2);border-radius:7px;overflow:hidden}
.bar .bf{height:100%;background:var(--acc);border-radius:7px}
.bar .bv{font-family:var(--mono);font-size:12px;min-width:38px;text-align:right;font-variant-numeric:tabular-nums}
.cols{display:flex;align-items:flex-end;gap:6px;height:96px;margin-top:12px}
.cols .c{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:4px;min-width:0}
.cols .cb{width:100%;background:var(--acc);border-radius:4px 4px 0 0;min-height:2px}
.cols .cl{font-size:10px;color:var(--mut);font-family:var(--mono);white-space:nowrap}
.exrow{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-top:1px solid var(--line);font-size:14px}
.exrow:first-of-type{border-top:none}
.exrow .xn{color:#c6cdd6;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.exrow .xv{font-family:var(--mono);font-size:13px;white-space:nowrap;font-variant-numeric:tabular-nums}
.exrow .up{color:var(--ok)}
.exrow .fl{color:var(--mut)}
.eyebrow{font-family:var(--disp);text-transform:uppercase;letter-spacing:.14em;font-size:13px;color:var(--acc);font-weight:600;display:flex;align-items:baseline;gap:7px}
.ver{font-family:var(--mono);font-size:10px;color:var(--mut);letter-spacing:.04em;padding:1px 6px;border:1px solid var(--line);border-radius:99px}
.langsw{display:flex;gap:2px;border:1px solid var(--line);border-radius:99px;padding:2px}
.langsw button{font-size:16px;line-height:1;padding:3px 8px;border-radius:99px;filter:grayscale(1) opacity(.55);transition:filter .15s,background .15s}
.langsw button.sel{background:var(--surface2);filter:none}
h1.day{font-family:var(--disp);font-weight:700;text-transform:uppercase;font-size:34px;line-height:1.05;letter-spacing:.01em;text-wrap:balance;margin-top:2px}
.sub{color:var(--mut);font-size:14px;margin-top:4px}
.phase{display:flex;align-items:center;gap:8px;margin-top:10px;padding:5px 10px;background:linear-gradient(90deg,rgba(240,166,60,.14),rgba(240,166,60,.04));border:1px solid var(--acc-dim);border-radius:9px;font-size:11px;color:#f4c47c;line-height:1.35}
.phase b{font-family:var(--disp);text-transform:uppercase;letter-spacing:.08em;font-weight:600;color:var(--acc);white-space:nowrap}

.strip{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0 2px}
.strip span{font-family:var(--disp);text-transform:uppercase;letter-spacing:.06em;font-size:10px;font-weight:600;color:var(--mut);border:1px solid var(--line);border-radius:99px;padding:2px 7px}
.strip span.hot{color:var(--acc);border-color:var(--acc-dim)}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin:10px 0}
.card h3{font-family:var(--disp);text-transform:uppercase;font-weight:700;font-size:18px;letter-spacing:.02em}
.exhead{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.dose{font-family:var(--mono);font-size:13px;color:var(--acc);white-space:nowrap;font-variant-numeric:tabular-nums}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.chip{font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--mut);background:var(--surface2);border-radius:6px;padding:2px 7px}
.chip.g{color:#8fd8b6}
.chip.a{color:#f4c47c}

.setrow{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.pill{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--line);background:var(--surface2);font-family:var(--mono);font-size:14px;color:var(--mut);transition:background .15s,border-color .15s}
.pill.on{background:var(--acc);border-color:var(--acc);color:#12151A;font-weight:700}
.w-wrap{margin-left:auto;display:flex;align-items:center;gap:5px;color:var(--mut);font-size:13px}
/* 16px mínimo: por debajo, iOS hace auto-zoom al enfocar el campo */
.w-in{width:70px;background:var(--surface2);border:1px solid var(--line);border-radius:8px;color:var(--text);font:16px var(--mono);padding:6px 8px;text-align:right}

.note-in{width:100%;background:var(--surface2);border:1px solid var(--line);border-radius:10px;color:var(--text);padding:10px 12px;font-size:16px;margin-top:10px;font-family:inherit;resize:vertical;min-height:44px}
.rng{display:flex;gap:4px}
.rng button{font-family:var(--disp);font-size:11px;font-weight:600;letter-spacing:.04em;padding:3px 9px;border:1px solid var(--line);border-radius:99px;color:var(--mut)}
.rng button.sel{color:var(--acc);border-color:var(--acc-dim);background:rgba(240,166,60,.1)}
.mv{display:flex;flex-direction:column;gap:2px}
.mv button{width:24px;height:15px;font-size:8px;line-height:1;color:var(--mut);background:var(--surface2);border:1px solid var(--line);border-radius:4px;padding:0}
.mv button:disabled{opacity:.22}
.exfoot{display:flex;gap:14px;margin-top:12px;font-size:13.5px}
.howbtn{color:var(--mut);text-decoration:underline;text-underline-offset:3px}
.how{display:none;margin-top:10px;padding:10px 12px;background:var(--surface2);border-radius:10px;font-size:14px;color:#c6cdd6;border-left:3px solid var(--acc-dim)}
.how.open{display:block}
.ytl{text-decoration:none;font-weight:600}
.ytl::after{content:" ▶";font-size:11px}

.note{color:#c6cdd6;font-size:14.5px}
.big{font-family:var(--disp);font-size:44px;font-weight:700;text-transform:uppercase;line-height:1;color:var(--acc)}
.runcard{text-align:left}
.donebtn{margin-top:12px;width:100%;padding:12px;border-radius:10px;background:var(--surface2);border:1px solid var(--line);font-family:var(--disp);text-transform:uppercase;letter-spacing:.08em;font-weight:600;font-size:15px}
.donebtn.on{background:rgba(70,192,138,.15);border-color:var(--ok);color:var(--ok)}

.pain{margin:16px 0}
.painbtns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
.painbtns button{padding:12px 6px;border-radius:10px;border:1.5px solid var(--line);background:var(--surface2);font-family:var(--disp);text-transform:uppercase;font-weight:600;font-size:14px;letter-spacing:.04em}
.painbtns .p0.sel{border-color:var(--ok);color:var(--ok);background:rgba(70,192,138,.12)}
.painbtns .p1.sel{border-color:var(--warn);color:var(--warn);background:rgba(232,150,62,.12)}
.painbtns .p2.sel{border-color:var(--bad);color:var(--bad);background:rgba(229,72,77,.12)}
.painmsg{margin-top:10px;font-size:14px;color:#c6cdd6;display:none;padding:10px 12px;border-radius:10px;background:var(--surface2)}
.painmsg.show{display:block}

.dayrow{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:13px 14px;margin:8px 0}
.dayrow .dn{font-family:var(--disp);text-transform:uppercase;font-weight:700;font-size:17px;width:46px;color:var(--mut)}
.dayrow.today .dn{color:var(--acc)}
.dayrow .dt{flex:1}
.dayrow .dt b{display:block;font-size:15.5px;font-weight:600}
.dayrow .dt small{color:var(--mut);font-size:13px}
.tick{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line);display:grid;place-items:center;font-size:14px;color:var(--ok)}
.tick.on{border-color:var(--ok);background:rgba(70,192,138,.12)}
.dayrow.today{border-color:var(--acc-dim)}

.seg{display:grid;grid-template-columns:1fr 1fr;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:4px;margin:12px 0;gap:4px}
.seg button{padding:10px;border-radius:9px;font-family:var(--disp);text-transform:uppercase;font-weight:600;letter-spacing:.05em;font-size:14px;color:var(--mut)}
.seg button.sel{background:var(--acc);color:#12151A}

.dcard{border-color:rgba(229,72,77,.4)}
.dcard h3{color:var(--bad)}
.dcard li,.lcard li{margin:7px 0 7px 18px;font-size:14.5px;color:#c6cdd6}
.lcard h3{color:var(--acc)}
h2.sect{font-family:var(--disp);text-transform:uppercase;font-weight:700;font-size:15px;letter-spacing:.1em;color:var(--mut);margin:22px 0 4px}

#ptr{position:fixed;top:calc(env(safe-area-inset-top,0px) + 10px);left:50%;transform:translateX(-50%);z-index:60;background:var(--surface2);border:1px solid var(--acc-dim);color:var(--acc);font-family:var(--disp);font-size:12px;letter-spacing:.05em;text-transform:uppercase;padding:6px 14px;border-radius:99px;display:none;box-shadow:0 4px 16px rgba(0,0,0,.4)}
#sheet{position:fixed;left:0;right:0;bottom:calc(72px + env(safe-area-inset-bottom,0px));display:none;justify-content:center;z-index:40;pointer-events:none;transform:translateZ(0);will-change:transform}
#sheet.show{display:flex}
.sheet-in{pointer-events:auto;display:flex;align-items:center;gap:14px;background:var(--surface2);border:1px solid var(--acc-dim);border-radius:16px;padding:12px 18px;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.tnum{font-family:var(--mono);font-size:30px;font-weight:600;color:var(--acc);font-variant-numeric:tabular-nums;min-width:74px;text-align:center}
.tlab{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em}
.tbtn{border:1px solid var(--line);border-radius:9px;padding:8px 12px;font-size:13px;color:var(--text);background:var(--surface)}

.iso{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;text-align:center;margin:10px 0}
.iso .tnum{font-size:52px;display:block;min-width:0}
.isodots{display:flex;gap:8px;justify-content:center;margin:10px 0}
.isodots i{width:12px;height:12px;border-radius:50%;background:var(--surface2);border:1px solid var(--line)}
.isodots i.on{background:var(--acc);border-color:var(--acc)}
.isobtn{margin-top:6px;padding:12px 26px;border-radius:99px;background:var(--acc);color:#12151A;font-family:var(--disp);text-transform:uppercase;font-weight:700;letter-spacing:.06em;font-size:15px}
.isobtn[disabled]{opacity:.5}
.isophase{font-family:var(--disp);text-transform:uppercase;letter-spacing:.1em;font-size:13px;color:var(--mut);margin-bottom:4px}

nav{position:fixed;bottom:0;left:0;right:0;background:rgba(18,21,26,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;justify-content:center;z-index:50;padding-bottom:env(safe-area-inset-bottom,0px);transform:translateZ(0);will-change:transform;-webkit-backface-visibility:hidden}
.nav-in{display:grid;grid-template-columns:repeat(6,1fr);width:100%;max-width:560px}
nav button{display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 2px 7px;font-family:var(--disp);text-transform:uppercase;letter-spacing:.03em;font-size:10px;font-weight:600;color:var(--mut);border-top:2px solid transparent;overflow:hidden;white-space:nowrap}
nav button svg{width:19px;height:19px;flex:none}
nav button.sel{color:var(--acc);border-top-color:var(--acc)}

.backlink{display:inline-block;margin:10px 0 0;color:var(--mut);font-size:14px;text-decoration:underline;text-underline-offset:3px}
table.mini{width:100%;border-collapse:collapse;font-size:14px;margin-top:8px}
table.mini td{padding:7px 6px;border-top:1px solid var(--line);color:#c6cdd6;vertical-align:top}
table.mini td:first-child{font-family:var(--disp);text-transform:uppercase;font-weight:600;color:var(--mut);white-space:nowrap}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<div class="app">
  <header id="hdr"></header>
  <main id="view"></main>
</div>

<div id="ptr" aria-live="polite"></div>

<div id="sheet" role="timer"><div class="sheet-in">
  <div><div class="tlab" id="tlab">Descanso</div><div class="tnum" id="tnum">1:00</div></div>
  <button class="tbtn" data-act="rest-add">+30s</button>
  <button class="tbtn" id="tskip" data-act="rest-skip">Saltar</button>
</div></div>

<nav><div class="nav-in" id="navin"></div></nav>

<script>
"use strict";
var APP_VERSION="v84";
function diagLine(){
  try{
    var p=document.createElement("div");p.style.cssText="position:absolute;visibility:hidden;padding-bottom:env(safe-area-inset-bottom)";
    document.body.appendChild(p);var inset=getComputedStyle(p).paddingBottom;document.body.removeChild(p);
    var vv=window.visualViewport;
    var stand=(window.matchMedia&&matchMedia("(display-mode: standalone)").matches)||window.navigator.standalone===true;
    var nav=document.querySelector("nav");var nb=nav?Math.round(nav.getBoundingClientRect().bottom):0;
    return APP_VERSION+" · win "+window.innerWidth+"×"+window.innerHeight+" · screen "+screen.width+"×"+screen.height+
      " · vv "+(vv?Math.round(vv.width)+"×"+Math.round(vv.height)+"@"+Math.round(vv.offsetTop):"—")+
      " · inset-b "+inset+" · navB "+nb+" · doc "+document.documentElement.scrollHeight+" · standalone "+stand;
  }catch(e){return APP_VERSION}
}
/* ---------- PWA setup ---------- */
(function(){
  try{
    var c=document.createElement("canvas");c.width=c.height=512;var x=c.getContext("2d");
    x.fillStyle="#12151A";x.fillRect(0,0,512,512);
    x.translate(256,256);x.rotate(-Math.PI/4);x.fillStyle="#F0A63C";
    [[-120,-16,240,32,16],[-108,-80,44,160,18],[64,-80,44,160,18],[-160,-56,36,112,16],[124,-56,36,112,16]].forEach(function(r){
      x.beginPath();if(x.roundRect)x.roundRect(r[0],r[1],r[2],r[3],r[4]);else x.rect(r[0],r[1],r[2],r[3]);x.fill();});
    var ti=document.createElement("link");ti.rel="apple-touch-icon";ti.href=c.toDataURL("image/png");document.head.appendChild(ti);
  }catch(e){}
  if("serviceWorker" in navigator&&location.protocol==="https:")navigator.serviceWorker.register("sw.js").catch(function(){});
})();

/* ---------- helpers ---------- */
function S(k,d){try{var v=localStorage.getItem("hs:"+k);return v===null?d:JSON.parse(v)}catch(e){return d}}
function W(k,v){try{localStorage.setItem("hs:"+k,JSON.stringify(v))}catch(e){}cloudPush(k,v)}
function yt(q){return "https://www.youtube.com/results?search_query="+encodeURIComponent(q)}
function pad(n){return (n<10?"0":"")+n}
function iso(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;")}
/* Vibración: Android tiene navigator.vibrate. iOS no expone API de vibración a

/* Estimación de reps para precargar: rango "8-12" → el mayor (12);
   lista "15/15/12" → la lista tal cual; "15" → 15; sin números → vacío */
function estReps(rs){
  rs=String(rs||"");
  var nums=rs.split(/[^\d.]+/).filter(Boolean).map(Number).filter(function(n){return n>0});
  if(!nums.length)return "";
  if(/[-–]/.test(rs)&&nums.length===2)return String(Math.max(nums[0],nums[1]));
  if(nums.length===1)return String(nums[0]);
  return nums.join(",");
}
function repsMid(reps){
  var mm=/(\d+(?:[.,]\d+)?)(?:\s*[-–]\s*(\d+(?:[.,]\d+)?))?/.exec(String(reps));
  if(!mm)return 0;
  var a=parseFloat(mm[1].replace(",", ".")),b=mm[2]?parseFloat(mm[2].replace(",", ".")):null;
  return b?(a+b)/2:a;
}
function buildLog(sid){

    if(!it.sets)return;
    var NSb=nSets(sid,i,it);
    var arr=st[i]||[],c=0;for(var j=0;j<NSb;j++)if(arr[j])c++;
    if(!c)return;
    var w=parseFloat(String(S("w:"+sid+":"+i,"")).replace(",", "."));
    var rp=String(S("r:"+TODAY+":"+sid+":"+i,"")).trim();
    if(!rp)rp=estReps(T(it.reps));   // misma estimación que se precarga en pantalla
    var tot=0;
    if(rp){
      var nums=rp.split(/[^\d.]+/).filter(Boolean).map(Number).filter(function(n){return n>0});
      if(nums.length===1)tot=nums[0]*c;
      else if(nums.length>1){
        var take=nums.slice(0,c);
        while(take.length<c)take.push(nums[nums.length-1]);
        tot=take.reduce(function(a,b){return a+b},0);
      }
    }
    if(!tot){var rm=repsMid(T(it.reps));tot=rm>0?rm*c:0}
    total+=c;
    if(w>0&&tot>0)vol+=tot*w;
    entries.push({n:T(it.n),m:muscleOf(sid,i,it),sets:c,reps:rp||null,target:nSets(sid,i,it)+"×"+T(it.reps),weight:w>0?w:null});
  });

  return {user_id:sbUser?sbUser.id:null,day:TODAY,session_id:sid,title:T(s.title),
          entries:entries,total_sets:total,est_volume:Math.round(vol),note:nt||null};
}

function muscleOf(sid,i,it){return (it&&it.m)||((MGROUPS[sid]||[])[i])||null}

/* Rutina por usuario: si existe la clave kv "routine" (subida desde el backend),
   sustituye a la semana/sesiones integradas. Así cada perfil (p. ej. Lorena)
   tiene su propio plan sin tocar este código. */
function getRT(){return S("routine",null)}
function getWeekBase(){var rt=getRT();return (rt&&rt.week)||WEEK}
function weekOrder(){
  var o=S("weekorder",null);
  if(!Array.isArray(o)||o.length!==7)return null;
  var seen={};
  for(var i=0;i<7;i++){var v=+o[i];if(!(v>=0&&v<7)||seen[v])return null;seen[v]=1}
  return o.map(Number);
}
function getWeek(){
  var base=getWeekBase(),o=weekOrder();
  if(!o)return base;
  return base.map(function(w,pos){
    var srcW=base[o[pos]],c={};
    for(var k in srcW)c[k]=srcW[k];
    c.d=w.d;c.name=w.name;return c;
  });
}
function getSession(sid){var rt=getRT();return (rt&&rt.sessions&&rt.sessions[sid])||EX[sid]}
/* Orden personalizado de ejercicios por sesión (kv "order:<sid>", sincronizado).
   Solo presentación: cada ejercicio conserva su índice interno, así pesos, series
   y grupo muscular viajan con él al moverlo. */
function orderOf(sid,n){
  var o=S("order:"+sid,null);
  if(!Array.isArray(o)||o.length!==n)return null;
  var seen={};
  for(var k=0;k<n;k++){var x=o[k];if(typeof x!=="number"||x<0||x>=n||seen[x])return null;seen[x]=1}
  return o;
}
function orderedIdx(sid,items){
  return orderOf(sid,items.length)||items.map(function(_,k){return k});
}

  var st=S(setsKey(sid),{});

    var idx=s.items.indexOf(it);var arr=st[idx]||[];

}

    return '<span class="chip'+cls+'">'+esc(t)+"</span>"}).join("");
  var foot='<div class="exfoot"><button class="howbtn" data-act="how">'+u("how")+'</button>';

  "<li><b>Pain 0-1/10</b> during and after. Next-day reaction = drop load or range next session. No exceptions.</li>"+
  "<li><b>RPE 6-7</b>: end every set with 2-3 reps in reserve. The last grinding rep is where the supraspinatus jumps in to “rescue” the lift.</li>"+
  "<li><b>Progression</b>: 2 clean sessions → +1-2 reps → top of the range on all sets → +2.5-5% load and back to the bottom of the range.</li>"+

  "<li>Military press and all overhead pressing.</li><li>Flat barbell bench press.</li><li>Dumbbell flys.</li>"+

  "<li>Upright rows (the single worst movement for this condition).</li><li>Overhead triceps extensions.</li>"+
  "<li>Dead hangs, even with feet supported (the bar stays as a band anchor).</li>"+
  "<li>Conventional back squat (rack position = external rotation + abduction); low-bar especially. With an SSB there's no reason to take that risk.</li>"+
  "<li>Ab-wheel and hanging core work.</li><li>Deep push-ups (incline push-ups with tucked elbows are fine).</li></ul></div>",

  "<li>Green light for adapted dead hangs, lateral raises in a comfortable range, and back squats?</li>"+
  "<li>Reintroduction order for heavy work: pulling (rows, pulldowns) → incline press → flat bench last.</li>"+
  "<li>The cuff block stays forever (prehab): it's what holds everything else up.</li></ul></div>",
 foot:'<p class="note" style="margin:14px 4px;color:var(--mut)">A strength routine built to train around a shoulder with subacromial conflict (supraspinatus) in recovery. It is a bridge phase until medical review: the decision to return to heavy loading always belongs to the rehab team, not an app.</p>'}};

/* ---------- dashboard ---------- */
function mondayOf(ds){
  var d=new Date(ds+"T12:00:00");var wd=(d.getDay()+6)%7;d.setDate(d.getDate()-wd);return iso(d);
}
function fmtK(n){return n>=10000?(n/1000).toFixed(1).replace(".0","")+"k":String(Math.round(n))}
function colChart(pairs,fmt){
  var max=1;pairs.forEach(function(p){if(p[1]>max)max=p[1]});
  return '<div class="cols">'+pairs.map(function(p){
    var hpx=Math.round(p[1]/max*76);
    return '<div class="c"><span style="font-size:10px;color:var(--mut);font-family:var(--mono)">'+(p[1]?(fmt?fmt(p[1]):p[1]):"")+'</span><div class="cb" style="height:'+hpx+'px'+(p[1]?"":";background:var(--surface2)")+'"></div><span class="cl">'+p[0]+"</span></div>"}).join("")+"</div>";
}
/* selector de rango compartido 7/30/90 */
function rangeSel(cur,act){
  return '<span class="rng">'+[7,30,90].map(function(r){
    return '<button data-act="'+act+'" data-r="'+r+'"'+(cur===r?' class="sel"':"")+'>'+r+"d</button>"}).join("")+"</span>";
}
/* barras apiladas de dos segmentos (a abajo, b arriba) */
function stack2(pairs,colA,colB,fmt){
  var max=1;pairs.forEach(function(p){if(p.a+p.b>max)max=p.a+p.b});
  return '<div class="cols">'+pairs.map(function(p){
    var tot=p.a+p.b,hT=Math.round(tot/max*76);
    var hA=tot?Math.round(hT*p.a/tot):0,hB=hT-hA;
    return '<div class="c"><span style="font-size:10px;color:var(--mut);font-family:var(--mono)">'+(tot?(fmt?fmt(tot):tot):"")+'</span>'+
      '<div style="width:100%;display:flex;flex-direction:column;justify-content:flex-end">'+
      '<div style="height:'+hB+'px;background:'+colB+';border-radius:4px 4px 0 0"></div>'+
      '<div style="height:'+hA+'px;background:'+colA+(hB?"":";border-radius:4px 4px 0 0")+'"></div></div>'+
      '<span class="cl">'+p.lbl+"</span></div>"}).join("")+"</div>";
}
var UPPERSET={chest:1,back:1,shoulders:1,biceps:1,triceps:1,cuff:1};
function isCardioLog(l){
  var es=l.entries||[];
  return (l.session_id||"").indexOf("garmin-")===0||(es.length>0&&es.every(function(e){return e.m==="cardio"}));
}
function entryVol(e){
  var w=+e.weight||0;if(!w)return 0;
  var reps=0;
  if(e.reps){
    var ns=String(e.reps).split(/[^\d.]+/).filter(Boolean).map(Number).filter(function(n){return n>0});
    if(ns.length===1)reps=ns[0]*(+e.sets||1);
    else if(ns.length>1)reps=ns.reduce(function(a,b){return a+b},0);
  }
  if(!reps&&e.target){
    var mm=/×(.+)$/.exec(e.target);
    reps=repsMid(mm?mm[1]:e.target)*(+e.sets||1);
  }
  return w*reps;
}

function statsView(){
  var logs=LOGS.data,h="";
  // semanas: últimas 8
  var weeks=[],wk={};
  for(var i=7;i>=0;i--){
    var d=new Date();d.setDate(d.getDate()-i*7);
    var m=mondayOf(iso(d));weeks.push(m);wk[m]={f:0,c:0,up:0,lo:0};
  }
  var exs={};
  logs.forEach(function(l){
    var m=mondayOf(l.day),cardio=isCardioLog(l);
    if(wk[m]){
      if(cardio)wk[m].c++;else wk[m].f++;
      if(!cardio)(l.entries||[]).forEach(function(e){
        var v=entryVol(e);if(!v)return;
        if(e.m==="legs")wk[m].lo+=v;else if(UPPERSET[e.m])wk[m].up+=v;
      });
    }
    (l.entries||[]).forEach(function(e){
      if(e.weight>0){
        var x=exs[e.n]||(exs[e.n]={first:e.weight,last:e.weight,max:e.weight,n:0});
        x.last=e.weight;if(e.weight>x.max)x.max=e.weight;x.n++;
      }
    });
  });
  var lbl=function(m){var d=new Date(m+"T12:00:00");return pad(d.getDate())+"/"+pad(d.getMonth()+1)};
  h+='<div class="card"><h3>'+u("statsSessions")+"</h3>"+
     stack2(weeks.map(function(m){return{lbl:lbl(m),a:wk[m].f,b:wk[m].c}}),"#F0A63C","#7BA1D9")+
     '<div class="chips" style="margin-top:8px"><span class="chip" style="color:#F0A63C">■ '+u("legF2")+'</span><span class="chip" style="color:#7BA1D9">■ '+u("legCar")+"</span></div></div>";
  h+='<div class="card"><h3>'+u("statsVolume")+" ("+u("kgLbl")+')</h3>'+
     stack2(weeks.map(function(m){return{lbl:lbl(m),a:Math.round(wk[m].up),b:Math.round(wk[m].lo)}}),"#F0A63C","#46C08A",fmtK)+
     '<div class="chips" style="margin-top:8px"><span class="chip" style="color:#F0A63C">■ '+u("legUp")+'</span><span class="chip" style="color:#46C08A">■ '+u("legLo")+"</span></div></div>";
  var ekeys=Object.keys(exs).sort(function(a,b){return exs[b].n-exs[a].n}).slice(0,10);
  if(ekeys.length){
    h+='<div class="card"><h3>'+u("statsExercises")+"</h3><div style='margin-top:6px'>"+ekeys.map(function(k){
      var x=exs[k];var up=x.last>x.first;
      return '<div class="exrow"><span class="xn">'+esc(k)+'</span><span class="xv'+(up?" up":"")+'">'+x.last+" / "+x.max+" "+u("kgLbl")+(up?" ↑":"")+"</span></div>"}).join("")+"</div></div>";
  }
  h+='<p class="note" style="margin:12px 4px;color:var(--mut)">'+logs.length+" "+u("totalLbl")+"</p>";
  return h;
}

/* Gráfica de tendencias por carriles: cada serie en su banda (mismo eje temporal),
   con su etiqueta y último valor. Las series ruidosas se suavizan (media móvil). */
function smoothRows(rows,n){
  if(!n||rows.length<3)return rows;
  var out=[];
  for(var i=0;i<rows.length;i++){
    var a=Math.max(0,i-n+1),s=0,c=0;
    for(var j=a;j<=i;j++){s+=rows[j].v;c++}
    out.push({day:rows[i].day,v:s/c});
  }
  return out;
}
function multiChart(defs){
  var ds=defs.map(function(s){
    return {label:s.label,color:s.color,dash:s.dash,goal:s.goal,rows:smoothRows(s.rows,s.smooth)};
  }).filter(function(s){return s.rows.length>1});
  if(!ds.length)return "";
  var days=[];ds.forEach(function(s){s.rows.forEach(function(r){days.push(r.day)})});
  days.sort();
  var t0=+new Date(days[0]),t1=+new Date(days[days.length-1])||t0+1;
  var LH=32,W=320,H=ds.length*LH+16;
  var svg='<svg viewBox="0 0 '+W+" "+H+'" style="width:100%;height:auto;margin-top:8px" role="img">';
  [0,1/3,2/3,1].forEach(function(fr){
    var d=new Date(t0+fr*(t1-t0));
    var anchor=fr===0?"start":(fr===1?"end":"middle");
    svg+='<text x="'+(2+(W-4)*fr).toFixed(0)+'" y="'+(H-3)+'" fill="#8E99A8" font-size="8" font-family="monospace" text-anchor="'+anchor+'">'+pad(d.getDate())+"/"+pad(d.getMonth()+1)+"</text>";
  });
  ds.forEach(function(s,i){
    var top=2+i*LH;
    if(i)svg+='<line x1="0" y1="'+top+'" x2="'+W+'" y2="'+top+'" stroke="#2B3442" stroke-width="0.6"/>';
    var vs=s.rows.map(function(r){return r.v});
    var vmin=Math.min.apply(null,vs),vmax=Math.max.apply(null,vs);
    if(s.goal!=null){
      vmin=Math.min(vmin,s.goal);vmax=Math.max(vmax,s.goal);
      var vpad=(vmax-vmin)*0.14||0.5;
      if(s.goal<=Math.min.apply(null,vs))vmin-=vpad*1.8;else vmin-=vpad;
      if(s.goal>=Math.max.apply(null,vs))vmax+=vpad*1.8;else vmax+=vpad;
    }
    if(vmax-vmin<1e-9){vmax+=1;vmin-=1}
    var pts=s.rows.map(function(r){
      var x=2+(W-4)*((+new Date(r.day)-t0)/((t1-t0)||1));
      var y=(top+LH-5)-(LH-17)*((r.v-vmin)/(vmax-vmin));
      return x.toFixed(1)+","+y.toFixed(1)}).join(" ");
    if(s.goal!=null){
      var gy=(top+LH-5)-(LH-17)*((s.goal-vmin)/(vmax-vmin));
      svg+='<line x1="2" y1="'+gy.toFixed(1)+'" x2="'+(W-2)+'" y2="'+gy.toFixed(1)+'" stroke="'+s.color+'" stroke-width="1.1" stroke-dasharray="3 3" opacity=".8"/>';
      svg+='<text x="'+(W-4)+'" y="'+(gy-3).toFixed(1)+'" fill="'+s.color+'" font-size="8" font-family="monospace" text-anchor="end" font-weight="600">◎ '+s.goal+"</text>";
    }
    svg+='<polyline fill="none" stroke="'+s.color+'" stroke-width="1.6"'+(s.dash?' stroke-dasharray="4 3"':"")+' stroke-linejoin="round" opacity=".95" points="'+pts+'"/>';
    svg+='<text x="4" y="'+(top+10)+'" fill="'+s.color+'" font-size="8.5" font-family="-apple-system,sans-serif" font-weight="600">'+esc(s.label)+"</text>";
    var last=s.rows[s.rows.length-1].v;
    svg+='<text x="'+(W-4)+'" y="'+(top+10)+'" fill="'+s.color+'" font-size="8.5" font-family="monospace" text-anchor="end">'+(Math.round(last*10)/10)+"</text>";
  });
  svg+="</svg>";
  return svg;
}

/* Casa un workout_log con su actividad Garmin: runs por id exacto; fuerza por
   mismo día, tipo no-running, la más cercana en hora al momento del guardado. */
function garminFor(l){
  var acts=GACT.data||[];
  var sid=l.session_id||"";
  if(sid.indexOf("garmin-")===0){
    var id=sid.slice(7);
    for(var a=0;a<acts.length;a++)if(String(acts[a].activity_id)===id)return acts[a];
    return null;
  }
  var day=acts.filter(function(x){return (x.start_time||"").slice(0,10)===l.day&&(x.type||"").indexOf("running")<0});
  if(!day.length)return null;
  if(day.length===1||!l.created_at)return day[0];
  var ct=+new Date(l.created_at);
  day.sort(function(x,y){
    var ex=+new Date(x.start_time)+(+x.duration_min||0)*60000;
    var ey=+new Date(y.start_time)+(+y.duration_min||0)*60000;
    return Math.abs(ex-ct)-Math.abs(ey-ct)});
  return day[0];
}

/* Sparkline: curva suavizada (cuadráticas por punto medio) + área + punto final */
function spark(vals,color){
  if(!vals||vals.length<2)return "";
  var w=84,h=24,n=vals.length;
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);
  if(mx-mn<1e-9){mx+=1;mn-=1}
  function X(i){return +(2+(w-4)*i/(n-1)).toFixed(1)}
  function Y(v){return +((h-3)-(h-7)*((v-mn)/(mx-mn))).toFixed(1)}
  var d="M"+X(0)+" "+Y(vals[0]);
  for(var i=1;i<n-1;i++){
    d+=" Q"+X(i)+" "+Y(vals[i])+" "+((X(i)+X(i+1))/2).toFixed(1)+" "+((Y(vals[i])+Y(vals[i+1]))/2).toFixed(1);
  }
  d+=" L"+X(n-1)+" "+Y(vals[n-1]);
  var area=d+" L"+X(n-1)+" "+(h-1)+" L"+X(0)+" "+(h-1)+" Z";
  return '<svg viewBox="0 0 '+w+" "+h+'" style="width:100%;max-width:'+w+'px;height:auto;display:block;margin-top:5px" aria-hidden="true">'+
    '<path d="'+area+'" fill="'+color+'" opacity="0.14"/>'+
    '<path d="'+d+'" fill="none" stroke="'+color+'" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>'+
    '<circle cx="'+X(n-1)+'" cy="'+Y(vals[n-1])+'" r="2.2" fill="'+color+'"/></svg>';
}

/* Texto rico compartido (parte semanal y línea base): viñetas "- ", párrafos y **negritas** */
function richBody(txt){
  var html="",list=[];
  function fmt(x){
    return esc(x).replace(/\*\*(.+?)\*\*/g,"<b>$1</b>")
      .replace(/\[([^\]]+)\]\((https?:[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener" style="color:var(--acc)">$1</a>');
  }
  function flush(){if(list.length){html+='<ul class="blist">'+list.map(function(x){return "<li>"+x+"</li>"}).join("")+"</ul>";list=[]}}
  String(txt).split("\n").forEach(function(ln){
    ln=ln.trim();
    if(!ln){flush();return}
    if(ln.indexOf("- ")===0)list.push(fmt(ln.slice(2)));
    else{flush();html+='<p class="bp">'+fmt(ln)+"</p>"}
  });
  flush();
  return html;
}

/* Resumen en Hoy: pasos, sueño, HRV, FC reposo, kcal in/out.
   Día seleccionado con flechas (state.dayOff) y rango 1/7/30 (state.dayRange: >1 = medias). */
function dayCard(){
  if(!cloudOn())return "";
  if(METRICS.data===null){loadMetrics();return ""}
  var M=METRICS.data;if(!M.length)return "";
  var day=selDay(),rng=state.dayRange||1;
  var r=rowFor(day);
  if(!r&&(state.dayOff||0)===0)r=M[M.length-1];
  r=r||{day:day};
  function v(x,f){return (x==null)?"—":(f?f(x):x)}
  function win(key){
    var span=rng===1?7:rng;
    var st0=new Date(day+"T12:00");st0.setDate(st0.getDate()-(span-1));var sS=iso(st0);
    var out=[];M.forEach(function(x){if(x.day>=sS&&x.day<=day&&x[key]!=null)out.push(+x[key])});
    return out;
  }
  function avg(arr){if(!arr.length)return null;var s=0;arr.forEach(function(x){s+=x});return s/arr.length}
  function val(key,f){return rng===1?v(r[key],f):v(avg(win(key)),f)}
  var stepsSpark=(rng===1&&Array.isArray(r.steps_curve)&&r.steps_curve.length>1)?
    spark(r.steps_curve,"#F0A63C"):spark(win("steps"),"#F0A63C");
  var slV;
  if(rng===1)slV=r.sleep_h!=null?(+r.sleep_h).toFixed(1)+" h"+(r.sleep_score?" · "+r.sleep_score:""):"—";
  else{var sh=avg(win("sleep_h")),sc=avg(win("sleep_score"));slV=sh==null?"—":sh.toFixed(1)+" h"+(sc?" · "+Math.round(sc):"")}
  var wRow=null;
  for(var wi=M.length-1;wi>=0;wi--){if(M[wi].day<=day&&M[wi].weight_kg!=null){wRow=M[wi];break}}
  function wwin(){
    var span=rng===1?14:rng;
    var st1=new Date(day+"T12:00");st1.setDate(st1.getDate()-(span-1));var sS1=iso(st1);
    var out=[];M.forEach(function(x){if(x.day>=sS1&&x.day<=day&&x.weight_kg!=null)out.push(+x.weight_kg)});
    return out;
  }
  var wVal;
  if(rng===1)wVal=wRow?(+wRow.weight_kg).toFixed(1)+" kg":"—";
  else{var wa=avg(win("weight_kg"));wVal=wa==null?"—":wa.toFixed(1)+" kg"}
  var fRow=null;
  for(var fi=M.length-1;fi>=0;fi--){if(M[fi].day<=day&&M[fi].body_fat_pct!=null){fRow=M[fi];break}}
  function fwin(){
    var span=rng===1?14:rng;
    var st2=new Date(day+"T12:00");st2.setDate(st2.getDate()-(span-1));var sS2=iso(st2);
    var out=[];M.forEach(function(x){if(x.day>=sS2&&x.day<=day&&x.body_fat_pct!=null)out.push(+x.body_fat_pct)});
    return out;
  }
  var fVal;
  if(rng===1)fVal=fRow?(+fRow.body_fat_pct).toFixed(1)+" %":"—";
  else{var fa=avg(win("body_fat_pct"));fVal=fa==null?"—":fa.toFixed(1)+" %"}
  ensureGoal();
  var GG=S("goal",{})||{};
  function gtag(v){return v?' <span style="font-size:11px;color:var(--mut);font-weight:400">◎ '+v+"</span>":""}
  var tiles=[
    ["⚖️ "+T(B("Peso","Weight")),wVal+gtag(GG.weight_kg),null,spark(wwin(),"#C88BD8")],
    ["🧈 "+u("bodyFat"),fVal+gtag(GG.body_fat_pct),null,spark(fwin(),"#46C08A")],
    ["👣 "+u("dSteps"),val("steps",function(x){return Math.round(x).toLocaleString()}),null,stepsSpark],
    ["😴 "+u("dSleep"),slV,rng===1?r.sleep_q:null,spark(win("sleep_h"),"#46C08A")],
    ["💓 HRV",val("hrv_ms",function(x){return Math.round(x)+" ms"}),rng===1?r.hrv_q:null,spark(win("hrv_ms"),"#4DD0C0")],
    ["🫀 "+u("dRhr"),val("rhr",function(x){return Math.round(x)}),null,
      (rng===1&&Array.isArray(r.hr_curve)&&r.hr_curve.length>1)?spark(r.hr_curve,"#E5484D"):spark(win("rhr"),"#E5484D")],
    ["🍽️ Kcal in",val("kcal_in",function(x){return Math.round(x)}),null,spark(win("kcal_in"),"#7BA1D9")],
    ["🔥 Kcal out",val("kcal_out",function(x){return Math.round(x)}),null,spark(win("kcal_out"),"#E8963E")]
  ];
  if(GG.eat!=null){
    var act=0,tR=rowFor(day);
    if(tR&&tR.kcal_active!=null)act=+tR.kcal_active;
    var budget=GG.eat+act;
    var dsub=' <span style="font-size:11px;color:var(--mut);font-weight:400">'+GG.eat+"+"+Math.round(act)+"</span>";
    if(rng===1&&day===TODAY){
      var remain=Math.round(budget-((tR&&tR.kcal_in)||0));
      tiles.push(["🎯 "+T(B("Por comer","Left to eat")),
        '<span style="color:'+(remain>=0?"var(--ok)":"#E5484D")+'">'+remain+"</span>"+dsub,null,""]);
    }else if(rng===1){
      if(tR&&tR.kcal_in!=null){
        var over=Math.round(+tR.kcal_in-budget);
        tiles.push(["🎯 "+T(B("Vs presupuesto","Vs budget")),
          '<span style="color:'+(over<=0?"var(--ok)":"#E5484D")+'">'+(over>0?"+":"")+over+"</span>"+dsub,null,""]);
      }
    }else{
      var iW=avg(win("kcal_in")),aW=avg(win("kcal_active"));
      if(iW!=null){
        var bW=GG.eat+(aW||0);
        var ovW=Math.round(iW-bW);
        tiles.push(["🎯 "+T(B("Vs presupuesto","Vs budget")),
          '<span style="color:'+(ovW<=0?"var(--ok)":"#E5484D")+'">'+(ovW>0?"+":"")+ovW+'</span> <span style="font-size:11px;color:var(--mut);font-weight:400">'+T(B("media","avg"))+"</span>",null,""]);
      }
    }
  }
  var rsel='<span class="rng">'+[[1,T(B("Día","Day"))],[7,"7d"],[30,"30d"]].map(function(p){
    return '<button data-act="dayrange" data-r="'+p[0]+'"'+(rng===p[0]?' class="sel"':"")+'>'+p[1]+"</button>"}).join("")+"</span>";
  return '<div class="card"><div class="exhead" style="margin-bottom:9px"><div class="tlab">'+u("bodyT")+"</div>"+rsel+"</div><div class=\"dgrid\">"+tiles.map(function(t){
    return '<div><div class="tlab">'+t[0]+'</div><div class="dval">'+t[1]+"</div>"+qualSub(t[2])+(t[3]||"")+"</div>"}).join("")+"</div>"+
    (rng===1&&r.day!==day?'<p class="note" style="font-size:11px;color:var(--mut);margin-top:8px">'+r.day+"</p>":"")+srcLine()+"</div>";
}

  }


  // tabla semanal
  var byweek={};
  M.forEach(function(r){var m=mondayOf(r.day);(byweek[m]=byweek[m]||[]).push(r)});
  var weeks=Object.keys(byweek).sort().slice(-8);
  if(weeks.length){

      var cb=eatw.length?Math.round(eatw.reduce(function(a,r){return a+(+r.carbs_g||0)},0)/eatw.length):"—";
      var outw=rs.filter(function(r){return r.kcal_out!=null});
      var kout=outw.length?Math.round(outw.reduce(function(a,r){return a+ +r.kcal_out},0)/outw.length):"—";
      var wsr=rs.filter(function(r){return r.weight_kg!=null});
      var peso=wsr.length?(+wsr[0].weight_kg).toFixed(1)+"→"+(+wsr[wsr.length-1].weight_kg).toFixed(1):"—";
      var fsr=rs.filter(function(r){return r.body_fat_pct!=null});
      var fat=fsr.length?(+fsr[fsr.length-1].body_fat_pct).toFixed(1):"—";
      var d=new Date(wk+"T12:00:00");
      return "<tr><td>"+pad(d.getDate())+"/"+pad(d.getMonth()+1)+"</td><td>"+eatw.length+"</td><td>"+kin+"</td><td>"+cb+"</td><td>"+kout+"</td><td>"+peso+"</td><td>"+fat+"</td></tr>";
    }).join("");
    h+='<div class="card"><h3>'+u("weeklyT")+'</h3><div style="overflow-x:auto"><table class="mini" style="min-width:430px"><tr>'+
       "<td>"+u("thW")+"</td><td>"+u("thReg")+"</td><td>"+u("thIn")+"</td><td>"+u("thCarbs")+"</td><td>"+u("thOut")+"</td><td>"+u("thPeso")+"</td><td>"+u("thGrasa")+"</td></tr>"+trs+"</table></div></div>";
  }
  return h;

/* ---------- wake lock: pantalla despierta mientras corre un temporizador ---------- */
var wakeL=null;
function wakeOn(){
  try{
    if(navigator.wakeLock&&!wakeL)
      navigator.wakeLock.request("screen").then(function(l){
        wakeL=l;l.addEventListener("release",function(){wakeL=null});
      },function(){});
  }catch(e){}
}
function wakeOff(){try{if(wakeL){wakeL.release();wakeL=null}}catch(e){}}

/* ¿Qué toca después? Series pendientes del ejercicio actual, o el siguiente
   ejercicio con series (en el orden visible del usuario), o sesión completa. */
function nextSetMsg(sid,lastI){
  var s=getSession(sid);if(!s||!s.items)return "";
  var st=S(setsKey(sid),{});
  var it=s.items[lastI],arr=st[lastI]||[];
  if(it)for(var j=0;j<it.sets;j++)
    if(!arr[j])return T(it.n)+" · "+u("serieLbl")+" "+(j+1)+"/"+it.sets;
  var ord=orderedIdx(sid,s.items),pos=ord.indexOf(lastI);
  for(var k=pos+1;k<ord.length;k++){
    var oi=ord[k],it2=s.items[oi];
    if(!it2.sets)continue;
    var a2=st[oi]||[];
    for(var j2=0;j2<it2.sets;j2++)
      if(!a2[j2])return u("nextLbl")+" "+T(it2.n)+" · "+u("serieLbl")+" "+(j2+1)+"/"+it2.sets;
  }
  return u("sessDone");
}

/* ---------- rest timer (basado en hora real: sobrevive al segundo plano) ---------- */
var rest={t:null,endAt:0,done:true,sid:null,i:-1};
function restStart(sec,sid,i){
  clearInterval(rest.t);
  rest.endAt=Date.now()+sec*1000;rest.done=false;rest.sid=sid||null;rest.i=(i===undefined?-1:i);
  document.getElementById("sheet").classList.add("show");
  var lab=document.getElementById("tlab");
  if(lab){
    var nx=rest.sid?nextSetMsg(rest.sid,rest.i):"";
    lab.textContent=nx?(nx.length>34?nx.slice(0,33)+"…":nx):u("rest");
  }
  wakeOn();
  var nx2=rest.sid?nextSetMsg(rest.sid,rest.i):"";
  schedulePush(sec,nx2||u("rest"));
  restTick();rest.t=setInterval(restTick,500);
}
function restStop(){
  rest.done=true;clearInterval(rest.t);
  document.getElementById("sheet").classList.remove("show");
  if(!isoST.running)wakeOff();
}
function restTick(){
  if(rest.done)return;
  var n=document.getElementById("tnum");if(!n)return;
  var left=Math.max(0,Math.ceil((rest.endAt-Date.now())/1000));
  n.textContent=Math.floor(left/60)+":"+pad(left%60);
  if(left<=0){
    restStop();beep();
    var nx=rest.sid?nextSetMsg(rest.sid,rest.i):"";
    notifyEnd(nx?u("restDoneShort")+" · "+nx:u("restDone"));
  }
}

/* ---------- iso timer (basado en hora real) ---------- */
var isoST={series:0,t:null,endAt:0,running:false};
function isoStart(){
  if(isoST.running)return;
  if(isoST.series>=5){isoST.series=0;isoDots()}
  isoST.running=true;isoST.endAt=Date.now()+45000;
  var btn=document.getElementById("isobtn");btn.disabled=true;btn.textContent=u("isoHold");
  document.getElementById("isophase").textContent=u("isoSerie")+" "+(isoST.series+1)+" "+u("isoOf")+" · "+u("isoPush");
  wakeOn();
  isoTick();isoST.t=setInterval(isoTick,500);
}
function isoTick(){
  if(!isoST.running)return;
  var n=document.getElementById("isonum");if(!n){clearInterval(isoST.t);isoST.running=false;return}
  var left=Math.max(0,Math.ceil((isoST.endAt-Date.now())/1000));
  n.textContent="0:"+pad(left);
  if(left<=0){
    clearInterval(isoST.t);isoST.running=false;isoST.series++;beep();notifyEnd(u("isoDoneN"));isoDots();
    if(rest.done)wakeOff();
    var btn=document.getElementById("isobtn");btn.disabled=false;
    if(isoST.series>=5){btn.textContent=u("isoDone");document.getElementById("isophase").textContent=u("isoAllDone");}
    else{btn.textContent=u("isoSerie")+" "+(isoST.series+1)+" "+u("isoRestHint");document.getElementById("isophase").textContent=u("isoRest")+" · "+isoST.series+" "+u("isoOf");}
  }
}

/* ---------- pull-to-refresh: tirón hacia abajo desde el tope = recargar todo ---------- */
var refreshing=false;
function ptrEl(){return document.getElementById("ptr")}
function doRefresh(){
  if(refreshing)return;
  refreshing=true;
  var p=ptrEl();if(p){p.textContent=u("ptrBusy");p.style.display="block";}
  LOGS.data=null;METRICS.data=null;GACT.data=null;LASTUP=null;LASTUPloading=false;
  var fin=function(){refreshing=false;if(p)p.style.display="none";render(true);};
  if(cloudOn()){
    Promise.all([pullAll(),loadProfile()]).then(function(){render(true);setTimeout(fin,900);},function(){fin()});
  }else{render(true);setTimeout(fin,500);}
}
(function(){
  var sy=null,armed=false;
  window.addEventListener("touchstart",function(e){
    sy=(window.scrollY<=0&&e.touches.length===1)?e.touches[0].clientY:null;
    armed=false;
  },{passive:true});
  window.addEventListener("touchmove",function(e){
    if(sy===null||refreshing)return;
    if(window.scrollY>0){sy=null;armed=false;var p=ptrEl();if(p)p.style.display="none";return}
    var dy=e.touches[0].clientY-sy,p2=ptrEl();
    if(dy>90&&!armed){armed=true;if(p2){p2.textContent=u("ptrPull");p2.style.display="block";}}
    else if(dy<=90&&armed){armed=false;if(p2)p2.style.display="none";}
  },{passive:true});
  window.addEventListener("touchend",function(){
    if(armed&&!refreshing)doRefresh();
    else if(!refreshing){var p=ptrEl();if(p)p.style.display="none";}
    sy=null;armed=false;
  });
})();

/* al volver del segundo plano: recalcular contra el reloj (si venció, suena ya) */
document.addEventListener("visibilitychange",function(){
  if(document.visibilityState!=="visible")return;
  if(!rest.done){wakeOn();restTick();}
  if(isoST.running){wakeOn();isoTick();}
});
function isoDots(){
  var d=document.getElementById("isodots");if(!d)return;
  Array.prototype.forEach.call(d.children,function(el,i){el.className=i<isoST.series?"on":""});
}

/* ---------- events ---------- */
document.addEventListener("click",function(e){
  var b=e.target.closest("[data-act],[data-tab]");if(!b)return;
  var tab=b.getAttribute("data-tab"),act=b.getAttribute("data-act");
  if(tab&&!act){state.tab=tab;state.sid=null;render();return}
  if(act==="lang"){LANG=b.dataset.l;W("lang",LANG);render();return}
  if(act==="ver"){
    b.textContent="…";
    Promise.resolve()
      .then(function(){return (window.caches&&caches.keys)?caches.keys().then(function(ks){return Promise.all(ks.map(function(k){return caches.delete(k)}))}):null})
      .then(function(){return navigator.serviceWorker?navigator.serviceWorker.getRegistrations().then(function(rs){return Promise.all(rs.map(function(r){return r.unregister()}))}):null})
      .then(function(){location.reload()},function(){location.reload()});
    return;
  }
  if(act==="acct"){state.tab="cuenta";state.sid=null;render();return}
  if(act==="login"||act==="signup"){doAuth(act);return}
  if(act==="logout"){sb.auth.signOut();return}
  if(act==="savename"){saveName();return}
  if(act==="goto"){e.preventDefault();state.tab=b.getAttribute("data-tab");render();return}
  if(act==="pill"){
    var sid=b.dataset.sid,i=+b.dataset.i,j=+b.dataset.j;
    var st=S(setsKey(sid),{});var arr=st[i]||[];
    arr[j]=!arr[j];st[i]=arr;W(setsKey(sid),st);
    b.classList.toggle("on",arr[j]);
    if(arr[j]){haptic(1);askNotif();restStart(60,sid,i);}
    return;
  }
  if(act==="setminus"||act==="setplus"){
    var sidN=b.dataset.sid,iN=+b.dataset.i;
    var sN=getSession(sidN);if(!sN||!sN.items||!sN.items[iN])return;
    var cur=nSets(sidN,iN,sN.items[iN]);
    var nx=Math.max(1,Math.min(10,cur+(act==="setplus"?1:-1)));
    if(nx!==cur){W("nsets:"+sidN+":"+iN,nx);render(true)}
    return;
  }
  if(act==="mvup"||act==="mvdn"){
    var sidM=b.dataset.sid,iM=+b.dataset.i;
    var sM=getSession(sidM);if(!sM||!sM.items)return;
    var ordM=orderedIdx(sidM,sM.items);
    var p=ordM.indexOf(iM),q=act==="mvup"?p-1:p+1;
    if(p<0||q<0||q>=ordM.length)return;
    var tmp=ordM[p];ordM[p]=ordM[q];ordM[q]=tmp;
    W("order:"+sidM,ordM);render(true);return;
  }
  if(act==="how"){var how=b.closest(".card").querySelector(".how");how.classList.toggle("open");return}
  if(act==="pain"){W("pain:"+TODAY,+b.dataset.v);render(true);return}
  if(act==="run-done"){
    /* Solo marca adherencia al plan. El registro cardio con datos reales
       (km, ritmo, FC) llega solo desde Garmin vía la sincronización. */
    var k="done:"+TODAY+":"+b.dataset.sid;W(k,!S(k,false));
    render(true);return;
  }
  if(act==="savelog"){
    var sidL=b.dataset.sid;
    if(S("savedlog:"+TODAY+":"+sidL,false))return;
    if(!cloudOn()){state.tab="cuenta";render();return}
    var row=buildLog(sidL);
    if(row)saveLog(row,sidL);
    return;
  }
  if(act==="day"){state.sid=b.dataset.sid;state.tab="hoy";state.wkOpen=true;render();return}
  if(act==="togglewk"){state.wkOpen=!state.wkOpen;render(true);return}
  if(act==="back"){state.sid=null;render();return}
  if(act==="vmode"){state.viaje=b.dataset.m;W("viajeMode",state.viaje);render();return}
  if(act==="pview"){state.pview=b.dataset.pv;render();return}
  if(act==="wview"){state.wview=b.dataset.wv;render();return}
  if(act==="tview"){state.tview=b.dataset.tv;render();return}
  if(act==="wkmove"){
    var wi=+b.dataset.i,wd=+b.dataset.dir,wj=wi+wd;
    if(wj<0||wj>6)return;
    var wo=weekOrder()||[0,1,2,3,4,5,6];
    var tmp=wo[wi];wo[wi]=wo[wj];wo[wj]=tmp;
    W("weekorder",wo);render(true);return;
  }
  if(act==="wkreset"){W("weekorder",null);render(true);return}
  if(act==="hist"){state.histOpen=state.histOpen===b.dataset.k?null:b.dataset.k;render(true);return}
  if(act==="habit"){
    var dk="habits:"+selDay();
    var hs=S(dk,{});hs[b.dataset.h]=!hs[b.dataset.h];
    W(dk,hs);render(true);return;
  }
  if(act==="daynav"){state.dayOff=Math.max(0,Math.min(90,(state.dayOff||0)+(+b.dataset.d)));render(true);return}
  if(act==="dayrange"){state.dayRange=+b.dataset.r;render(true);return}
  if(act==="balrange"){state.balRange=+b.dataset.r;render(true);return}
  if(act==="macrange"){state.macRange=+b.dataset.r;render(true);return}
  if(act==="musrange"){state.musRange=+b.dataset.r;render(true);return}
  if(act==="rest-add"){
    rest.endAt+=30000;restTick();
    var nx3=rest.sid?nextSetMsg(rest.sid,rest.i):"";
    schedulePush(Math.max(1,Math.round((rest.endAt-Date.now())/1000)),nx3||u("rest"));
    return;
  }
  if(act==="rest-skip"){restStop();return}
  if(act==="iso"){isoStart();return}
});

  var inp=e.target.closest(".w-in,.note-in");if(!inp)return;
  W(inp.dataset.key,inp.value.trim());
  if(inp.dataset.key.indexOf("journal:")===0)render(true);
});
